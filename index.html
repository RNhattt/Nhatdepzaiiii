<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trang Chính - Lưu Bút 12A2</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #ff9ecf, #a0e9ff);
    text-align:center;
    color:white;
}

.container{
    animation: fadeIn 2s ease;
}

h1{
    font-size:50px;
    margin-bottom:15px;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
}

p{
    font-size:20px;
    margin-bottom:30px;
}

button{
    padding:12px 30px;
    font-size:18px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff4d94;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
    background:#ffe6f0;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}
</style>

</head>
<body>

<div class="container">
    <h1>KỶ YẾU LỚP 12A2 🎓</h1>
    <p>Thanh xuân của chúng ta – Nơi lưu giữ những kỷ niệm đẹp nhất</p>
    
    <button onclick="location.href='Trangchinh.html'" >
        Vào trang lưu bút
    </button>
</div>

</body>
</html>
